<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Mode Pro - Advanced Speech</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --green:#22c55e; --blue:#3b82f6; --red:#ef4444;
  --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
}
[data-theme="dark"] {
  --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --muted:#94a3b8; --border:#334155;
}

body { font-family:'Nunito',sans-serif; background-color: var(--bg); color: var(--text); min-height:100vh; display:flex; justify-content:center; padding:20px 16px; transition: 0.3s; }
#app { width:100%; max-width:440px; }
.card { background:var(--card); border-radius:24px; box-shadow:0 10px 30px rgba(0,0,0,0.1); padding:24px; border: 1px solid var(--border); position: relative; }

/* Kelime Analiz Görünümü */
.word-diff-container { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 15px 0; font-size: 18px; font-weight: 700; }
.w-correct { color: var(--green); }
.w-wrong { color: var(--red); text-decoration: line-through; opacity: 0.7; }
.w-missing { color: var(--muted); border-bottom: 2px dashed var(--red); }

.score-circle { width: 80px; height: 80px; border-radius: 50%; border: 5px solid var(--blue); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; margin: 10px auto; }

.mic-btn { width:80px; height:80px; border-radius:50%; border:none; cursor:pointer; font-size:30px; margin: 20px auto; display: block; transition: 0.3s; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }
.mic-idle { background: var(--blue); color: white; }
.mic-rec { background: var(--red); color: white; animation: pulse 1.5s infinite; }

@keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);} 100% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);} }

/* Orijinal CSS yapısı devamı */
.theme-toggle { position: absolute; top: -50px; right: 0; background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 50%; cursor: pointer; }
.hl { color: var(--green); font-weight: 800; }
.screen { display:none; } .active { display:block; }
.btn-primary { width:100%; padding:16px; background:var(--blue); color:white; border:none; border-radius:15px; font-weight:800; cursor:pointer; margin-top:10px; }
</style>
</head>
<body data-theme="light">

<div id="app">
  <div id="screen-upload" class="screen active">
    <div class="card" style="text-align:center">
      <h1>Word Mode Pro</h1>
      <p style="margin:20px 0; color:var(--muted)">Hafıza ve Gelişmiş Telaffuz Destekli</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📁 Excel Yükle</button>
      <button id="resumeBtn" class="btn-primary" style="display:none; background:var(--green); margin-top:10px;" onclick="resumeSession()">💾 Devam Et</button>
    </div>
  </div>

  <div id="screen-quiz" class="screen">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="card">
      <div id="wordDisplay" style="text-align:center; margin-bottom:20px"></div>
      
      <div id="pronunSection" style="background:rgba(59,130,246,0.03); padding:15px; border-radius:20px; border:1px dashed var(--border)">
        <p style="text-align:center; font-size:14px; color:var(--muted)">Şunu Söyleyin:</p>
        <p id="targetSentence" style="text-align:center; font-weight:800; margin:5px 0"></p>
        
        <button id="micBtn" class="mic-btn mic-idle" onclick="toggleSpeech()">🎤</button>
        <div id="diffOutput" class="word-diff-container"></div>
        <div id="scoreDisplay"></div>
      </div>

      <button class="btn-primary" onclick="nextWord()">Sonraki Kelime →</button>
    </div>
  </div>
</div>

<script>
let words = [], idx = 0, isListening = false;
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'en-US';
recognition.interimResults = false;

// --- Tema ve Hafıza ---
function toggleTheme() {
  const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('wm_theme', t);
}

function save() { localStorage.setItem('wm_state', JSON.stringify({words, idx})); }

function resumeSession() {
  const s = JSON.parse(localStorage.getItem('wm_state'));
  words = s.words; idx = s.idx;
  startApp();
}

// --- Dosya Yükleme ---
document.getElementById('fileInput').addEventListener('change', e => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    words = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]).map(r => ({
      word: r.word, tr: r.translation, sent: r.sentence || r.word, ph: r.phonetic || ''
    }));
    idx = 0; save(); startApp();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function startApp() {
  document.getElementById('screen-upload').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  render();
}

function render() {
  const item = words[idx];
  document.getElementById('wordDisplay').innerHTML = `
    <h1 style="font-size:36px; color:var(--green)">${item.word}</h1>
    <p style="font-style:italic; color:var(--muted)">${item.ph} - ${item.tr}</p>
  `;
  document.getElementById('targetSentence').textContent = item.sent;
  document.getElementById('diffOutput').innerHTML = '';
  document.getElementById('scoreDisplay').innerHTML = '';
  save();
}

// --- Gelişmiş Telaffuz Analizi ---
function toggleSpeech() {
  if(isListening) { recognition.stop(); return; }
  recognition.start();
}

recognition.onstart = () => { isListening=true; document.getElementById('micBtn').className='mic-btn mic-rec'; };
recognition.onend = () => { isListening=false; document.getElementById('micBtn').className='mic-btn mic-idle'; };

recognition.onresult = (e) => {
  const heard = e.results[0][0].transcript.toLowerCase().replace(/[.,!]/g,'');
  const target = words[idx].sent.toLowerCase().replace(/[.,!]/g,'');
  
  compareAndDisplay(target, heard);
};

function compareAndDisplay(target, heard) {
  const targetWords = target.split(' ');
  const heardWords = heard.split(' ');
  const output = document.getElementById('diffOutput');
  output.innerHTML = '';

  let correctCount = 0;
  
  targetWords.forEach((tw, i) => {
    const hw = heardWords[i] || "";
    const span = document.createElement('span');
    
    // Levenshtein benzerliği (basit)
    if(tw === hw) {
      span.className = 'w-correct';
      span.textContent = tw;
      correctCount++;
    } else if (hw === "") {
      span.className = 'w-missing';
      span.textContent = tw;
    } else {
      span.className = 'w-wrong';
      span.textContent = hw; // Yanlış söylenen
      const correctSpan = document.createElement('span');
      correctSpan.style.fontSize = '12px';
      correctSpan.style.display = 'block';
      correctSpan.style.color = 'var(--muted)';
      correctSpan.textContent = `(${tw})`;
      span.appendChild(correctSpan);
    }
    output.appendChild(span);
  });

  const finalScore = Math.round((correctCount / targetWords.length) * 100);
  document.getElementById('scoreDisplay').innerHTML = `
    <div class="score-circle" style="border-color:${finalScore > 70 ? 'var(--green)' : 'var(--red)'}">
      ${finalScore}
    </div>
    <p style="text-align:center; font-weight:700">Başarı Oranı</p>
  `;
}

function nextWord() {
  idx++;
  if(idx < words.length) render();
  else alert("Tüm kelimeler bitti!");
}

if(localStorage.getItem('wm_state')) document.getElementById('resumeBtn').style.display='block';
if(localStorage.getItem('wm_theme')==='dark') toggleTheme();
</script>
</body>
</html>
