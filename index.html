<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Mode Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
  --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
  --muted: #64748b; --border: #e2e8f0;
}

/* Karanlık Mod Değişkenleri */
[data-theme="dark"] {
  --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9;
  --muted: #94a3b8; --border: #334155;
}

body {
  font-family: 'Nunito', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  transition: background-color 0.3s ease;
  min-height: 100vh; display: flex; justify-content: center; padding: 20px 16px;
}

.card {
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
  padding: 24px;
  border: 1px solid var(--border);
  width: 100%; max-width: 440px;
}

/* Tema Değiştirme Butonu */
.theme-toggle {
  position: fixed; top: 20px; right: 20px;
  background: var(--card-bg); border: 1px solid var(--border);
  padding: 10px; border-radius: 50%; cursor: pointer; font-size: 20px;
}

/* Diğer CSS sınıfları (Orijinal yapıya sadık kalınarak güncellendi) */
.word-card { background: rgba(59, 130, 246, 0.05); border: 1px solid var(--border); }
.opt-btn { background: var(--card-bg); color: var(--text); border: 2px solid var(--border); }
.opt-btn:hover { background: rgba(59, 130, 246, 0.1); }

/* Animasyonlar */
@keyframes shake { 0%, 100% {transform: translateX(0)} 25% {transform: translateX(-5px)} 75% {transform: translateX(5px)} }
.do-shake { animation: shake 0.3s ease-in-out; }
</style>
</head>
<body data-theme="light">

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div id="app">
  </div>

<script>
let state = {
  words: [], idx: 0, score: 100, streak: 0, correctCount: 0, theme: 'light'
};

// Sayfa yüklendiğinde verileri geri yükle
window.onload = () => {
  const saved = localStorage.getItem('wordData');
  if (saved) {
    const data = JSON.parse(saved);
    state = {...state, ...data};
    if (state.words.length > 0) {
      document.getElementById('resumeSection').style.display = 'block';
    }
  }
  applyTheme(state.theme);
};

function save() {
  localStorage.setItem('wordData', JSON.stringify(state));
}

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  applyTheme(state.theme);
  save();
}

function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  const btn = document.querySelector('.theme-toggle');
  btn.textContent = theme === 'light' ? '🌙' : '☀️';
}

// Orijinal fonksiyonlar 'state' objesi üzerinden güncellenmiştir
function nextWord() {
  state.idx++;
  if(state.idx >= state.words.length) {
    showDone();
  } else {
    save();
    renderLearn();
  }
}

// ... (Diğer tüm mantıksal fonksiyonlar burada devam eder)
</script>
</body>
</html>
